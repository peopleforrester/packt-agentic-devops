# ABOUTME: Student web-terminal (VTT) for a workshop cluster: a two-pane console (instructions left, ttyd
# ABOUTME: shell right). nginx serves the lab page and proxies /terminal/ to ttyd; both run in one pod.
#
# One Deployment + Service per cluster in the `workshop` namespace. nginx is the front door on 8080 and
# reverse-proxies /terminal/ to ttyd on loopback:7681. The Service is a plain type: LoadBalancer so the
# EKS cloud-controller-manager provisions a Classic ELB directly; it does not depend on the AWS Load
# Balancer Controller. The URL that ELB hands back is the student's two-pane lab page.
#
# The lab page (web/lab.html) and the nginx config (web/console.conf) are shipped as ConfigMaps generated
# from those files by apply.sh, so they stay editable as real files rather than YAML blobs.
---
apiVersion: v1
kind: Namespace
metadata:
  name: workshop
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-terminal
  namespace: workshop
---
# Durable home for Claude Code's login and conversation history. Survives a pod restart so a student is
# not logged out and can `claude --continue` after a reboot. tmux covers the common case (browser refresh);
# this covers the rare pod/node restart. 1Gi is ample for credentials and session transcripts.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: student-claude
  namespace: workshop
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
# The student's terminal is cluster-admin ON THEIR OWN SINGLE-TENANT THROWAWAY CLUSTER.
#
# This is deliberate, and a narrower role does not work. The workshop's entire task is for the student's
# agent to INSTALL a platform: ArgoCD alone creates ~12 CRDs plus ClusterRoles and ClusterRoleBindings,
# and the phases that follow add admission webhooks (Kyverno), more CRDs (Gateway API, kagent, KServe),
# and cluster-scoped controllers. A role that withholds CRD and RBAC creation blocks Phase 1 at its first
# command and every phase after it.
#
# The isolation boundary here is the CLUSTER, not intra-cluster RBAC: one disposable cluster per student,
# torn down after the workshop, with no shared tenancy and nothing of value on it. Scoping RBAC inside a
# cluster the student is meant to own outright buys no safety and costs the whole build.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: console-terminal
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: cluster-admin }
subjects:
  - kind: ServiceAccount
    name: web-terminal
    namespace: workshop
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-terminal
  namespace: workshop
  labels: { app.kubernetes.io/name: web-terminal }
spec:
  replicas: 1
  # Recreate, not RollingUpdate: the claude-home PVC is ReadWriteOnce, so the old pod must release it
  # before the new pod can mount it. Recreate avoids the two pods contending for the volume on a rollout.
  strategy: { type: Recreate }
  selector: { matchLabels: { app.kubernetes.io/name: web-terminal } }
  template:
    metadata: { labels: { app.kubernetes.io/name: web-terminal } }
    spec:
      serviceAccountName: web-terminal
      automountServiceAccountToken: true # the shell's kubectl uses this token to reach the cluster API
      # runAsNonRoot at the pod; each container pins its own numeric uid below (ttyd 1000 = the image's
      # `student` user; nginx 101 = the nginx-unprivileged user). Numeric uids let admission verify non-root.
      # fsGroup 1000 makes the mounted claude-home volume group-owned and writable by the student user.
      # No pod-level runAsUser/runAsGroup: each container sets its own uid/gid, and a pod-level runAsGroup
      # without a runAsUser makes runc reject the sandbox ("group specified without user").
      securityContext: { runAsNonRoot: true, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: ttyd
          image: ghcr.io/peopleforrester/packt-agentic-devops:web-terminal
          imagePullPolicy: Always # mutable tag; always re-pull so a rebuild lands on pod restart
          ports: [{ name: ttyd, containerPort: 7681 }]
          # The kube-context name the Starship prompt shows. Set it to the real cluster so the prompt reads
          # the truth (e.g. adwc-dev), not a placeholder. Per-cluster value in the fleet; the demo cluster here.
          env:
            - { name: CLUSTER_NAME, value: workshop-cluster }
          # The student's own AWS keys, mounted as the DEFAULT profile inside the VTT so `aws` works with
          # no flags. Created per-cluster outside git; optional so a cluster without it still runs.
          envFrom:
            - secretRef: { name: student-aws-creds, optional: true }
          volumeMounts:
            - { name: claude-home, mountPath: /home/student/.claude } # login + conversation history persist here
          readinessProbe:
            tcpSocket: { port: ttyd }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: ttyd }
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "2", memory: 2Gi }
        - name: nginx
          # nginx-unprivileged listens on 8080 and runs as uid 101. Public image; fine for a demo cluster.
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports: [{ name: http, containerPort: 8080 }]
          volumeMounts:
            - { name: web, mountPath: /usr/share/nginx/html, readOnly: true }
            - { name: conf, mountPath: /etc/nginx/conf.d, readOnly: true }
            - { name: status, mountPath: /run/status, readOnly: true } # serves /api/status
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 250m, memory: 128Mi }
        # Read-only phase detector: derives the current build phase from cluster state (via the pod
        # ServiceAccount) and writes it to the shared status volume for nginx to serve at /api/status.
        - name: status
          image: ghcr.io/peopleforrester/packt-agentic-devops:web-terminal
          imagePullPolicy: Always
          command: ["bash", "/opt/status/status-loop.sh"]
          volumeMounts:
            - { name: status, mountPath: /run/status }
            - { name: status-script, mountPath: /opt/status, readOnly: true }
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 25m, memory: 48Mi }
            limits: { cpu: 200m, memory: 128Mi }
      volumes:
        - name: web
          configMap: { name: console-src }
        - name: conf
          configMap: { name: console-conf }
        - name: status
          emptyDir: {}
        - name: status-script
          configMap: { name: status-src, defaultMode: 0755 }
        - name: claude-home
          persistentVolumeClaim: { claimName: student-claude }
---
apiVersion: v1
kind: Service
metadata:
  name: web-terminal
  namespace: workshop
  labels: { app.kubernetes.io/name: web-terminal }
spec:
  type: LoadBalancer
  selector: { app.kubernetes.io/name: web-terminal }
  ports:
    - name: http
      port: 80
      targetPort: http
