<!-- ABOUTME: Component endpoint directory for the workshop. A phase-revealed catalog of the platform UIs
     ABOUTME: and endpoints; tapping a card prints that component's address on the student's own cluster into
     ABOUTME: the terminal. Self-contained; served at /links and embedded as a lab tab. -->
<!doctype html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%97</text></svg>">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Endpoints — Agentic DevOps with Claude</title>
<style>
  :root{
    --accent:#FA7040;--accent-d:#E85F2E;--ink:#191919;--cream:#F5F5F4;--panel:#ffffff;--lav:#FEF1EA;
    --mid:#4A4A4A;--line:#e7e2dc;--ok:#2e9e5b;--term:#0f1117;--future:#c9c3bb;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--cream);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header{background:var(--ink);color:#fff;padding:9px 16px;display:flex;align-items:center;gap:12px;flex:0 0 auto;border-bottom:3px solid var(--accent)}
  header .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:15px}
  header .brand .em{font-size:18px}
  header .spacer{flex:1}
  .note{flex:0 0 auto;background:var(--lav);border-bottom:1px solid var(--line);padding:9px 16px;font-size:13px;color:var(--ink)}
  .note b{color:var(--accent)}
  .controls{flex:0 0 auto;background:#fff;border-bottom:1px solid var(--line);padding:9px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .controls .lbl{font-size:12px;font-weight:700;color:var(--mid)}
  .pips{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
  .pip{width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--mid);font:inherit;font-size:12px;font-weight:800;cursor:pointer;display:grid;place-items:center}
  .pip.done{background:var(--lav);color:var(--accent);border-color:var(--lav)}
  .pip.cur{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 0 3px rgba(250,112,64,.25)}

  .grid{flex:1;min-height:0;overflow:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;align-content:start}
  .card{border:1.5px solid var(--line);border-radius:12px;background:#fff;padding:13px 14px;display:flex;flex-direction:column;gap:8px;transition:all .35s ease}
  .card.future{opacity:.45;border-style:dashed}
  .card .top{display:flex;align-items:center;gap:8px}
  .card .nm{font-weight:800;font-size:15px}
  .card .ph{margin-left:auto;font-size:10.5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;color:var(--accent);background:var(--lav);border-radius:999px;padding:2px 8px;white-space:nowrap}
  .card.future .ph{color:var(--mid);background:#f0eeea}
  .card .desc{font-size:13px;color:var(--mid);line-height:1.45;margin:0}
  .card .ns{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:var(--ink)}
  .card .act{margin-top:auto;display:flex;gap:7px;align-items:center}
  .card .go{font:inherit;font-size:12.5px;font-weight:700;border:0;border-radius:8px;padding:7px 12px;cursor:pointer;background:var(--accent);color:#fff}
  .card .go:hover{background:var(--accent-d)}
  .card.future .go{background:#d8d2c9;cursor:default}
  .card .cmd{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;color:var(--mid);word-break:break-all}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 16px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;transition:opacity .2s;pointer-events:none;z-index:30}
  #toast.show{opacity:1}
</style>
</head>
<body>
  <header>
    <div class="brand"><span class="em">🔗</span> Endpoints</div>
    <div class="spacer"></div>
    <div style="font-size:12px;opacity:.8" id="count"></div>
  </header>
  <div class="note">You are in a browser terminal <b>on your cluster</b>. Reach each UI at the address your agent exposes for it. Tap a card to print that address in your terminal. Components appear here as you build them.</div>
  <div class="controls">
    <span class="lbl">Show up to phase:</span>
    <div class="pips" id="pips"></div>
  </div>
  <div class="grid" id="grid"></div>
  <div id="toast">copied</div>

<script>
  // Each endpoint: name, purpose, namespace, the phase it comes online, and a discovery command that
  // prints its address on THIS cluster. port-forward is intentionally avoided: it binds the pod's
  // localhost, not the student's browser, so it does not give browser access from a VTT.
  var EP = [
    {nm:'Argo CD', p:1, ns:'argocd', desc:'GitOps dashboard. Watch every Application sync and self-heal.',
     cmd:'kubectl -n argocd get ingress,svc argocd-server'},
    {nm:'Prometheus', p:2, ns:'observability', desc:'Metrics store and query UI.',
     cmd:'kubectl -n observability get svc -l app.kubernetes.io/name=prometheus'},
    {nm:'Grafana', p:2, ns:'observability', desc:'Dashboards for metrics, plus logs (Loki) and traces (Tempo) as data sources.',
     cmd:'kubectl -n observability get ingress,svc -l app.kubernetes.io/name=grafana'},
    {nm:'Alertmanager', p:2, ns:'observability', desc:'Alert routing and silences.',
     cmd:'kubectl -n observability get svc -l app.kubernetes.io/name=alertmanager'},
    {nm:'Backstage', p:3, ns:'backstage', desc:'Developer portal: catalog, TechDocs, scaffolder, the Argo CD plugin.',
     cmd:'kubectl -n backstage get ingress,svc'},
    {nm:'Gitea', p:3, ns:'gitea', desc:'In-cluster Git host the golden path publishes to.',
     cmd:'kubectl -n gitea get ingress,svc'},
    {nm:'Argo Workflows', p:3, ns:'argo', desc:'Workflow run history and DAGs.',
     cmd:'kubectl -n argo get ingress,svc argo-workflows-server'},
    {nm:'Argo Rollouts', p:3, ns:'argo-rollouts', desc:'Progressive-delivery dashboard.',
     cmd:'kubectl -n argo-rollouts get svc'},
    {nm:'kgateway', p:4, ns:'kgateway-system', desc:'AI-aware ingress gateway (Gateway API).',
     cmd:'kubectl -n kgateway-system get gateway,svc'},
    {nm:'agentgateway', p:4, ns:'agentgateway', desc:'Agentic data plane: LLM, MCP, and A2A traffic with mTLS and audit logs.',
     cmd:'kubectl -n agentgateway get svc,httproute'},
    {nm:'kagent', p:5, ns:'kagent', desc:'Kubernetes-native agent runtime. Your Agent CRDs live here.',
     cmd:'kubectl -n kagent get agents.kagent.dev'},
    {nm:'vLLM (via KServe)', p:6, ns:'kserve', desc:'In-cluster model, OpenAI-compatible endpoint. What the platform agents call.',
     cmd:'kubectl -n kserve get inferenceservice,svc'}
  ];

  var cur = 8;
  var gridEl = document.getElementById('grid');
  document.getElementById('count').textContent = EP.length + ' components';

  function toast(t){var e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(function(){e.classList.remove('show');},1300);}
  // Run a command: if embedded in the lab, hand it to the parent to paste into the terminal; standalone,
  // copy to the clipboard as a fallback.
  function run(cmd){
    if (window.parent && window.parent !== window){
      try { window.parent.postMessage({type:'vtt-run', text:cmd}, '*'); toast('Sent to your terminal'); return; } catch(e){}
    }
    if (navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(cmd); }
    toast('Copied: ' + cmd);
  }

  function render(){
    gridEl.innerHTML = '';
    EP.slice().sort(function(a,b){return a.p-b.p;}).forEach(function(e){
      var live = e.p <= cur;
      var card = document.createElement('div'); card.className = 'card' + (live?'':' future');
      card.innerHTML =
        '<div class="top"><span class="nm">'+e.nm+'</span><span class="ph">Phase '+e.p+'</span></div>'+
        '<p class="desc">'+e.desc+'</p>'+
        '<div class="ns">ns: '+e.ns+'</div>'+
        '<div class="act"></div>';
      var act = card.querySelector('.act');
      if (live){
        var btn = document.createElement('button'); btn.className='go'; btn.textContent='Show address ▸';
        btn.onclick = function(){ run(e.cmd); };
        act.appendChild(btn);
      } else {
        var s = document.createElement('span'); s.className='cmd'; s.textContent='available at phase '+e.p;
        act.appendChild(s);
      }
      gridEl.appendChild(card);
    });
    document.querySelectorAll('.pip').forEach(function(p,i){ p.classList.toggle('cur', i===cur); p.classList.toggle('done', i<cur); });
  }

  var pipsEl = document.getElementById('pips');
  for (var i=0;i<=8;i++){ (function(n){ var b=document.createElement('button'); b.className='pip'; b.textContent=n; b.onclick=function(){ cur=n; render(); }; pipsEl.appendChild(b); })(i); }
  var qp = new URLSearchParams(location.search).get('phase');
  if (qp !== null && !isNaN(+qp)) cur = Math.max(0, Math.min(8, +qp));
  render();
</script>
</body>
</html>
