# ABOUTME: nginx (unprivileged) for the workshop VTT console. Serves the two-pane lab page as the front
# ABOUTME: door and reverse-proxies /terminal/ to ttyd in the same pod, with the websocket upgrade ttyd needs.
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;   # lab.html, ConfigMap-mounted

  # The two-pane student lab page is the front door: instructions left, ttyd embedded right.
  location = /         { try_files /lab.html =404; }
  location = /lab      { try_files /lab.html =404; }

  # The interactive architecture blueprint (progressive reveal, phases 0-8). Served standalone for the
  # presenter and embedded as a tab in the lab page.
  location = /diagram  { try_files /diagram.html =404; }

  # The component endpoint directory (phase-revealed). Standalone and embedded as a lab tab.
  location = /links    { try_files /links.html =404; }

  # Web terminal (ttyd serves under base-path /terminal); needs websocket upgrade. ttyd runs in the
  # same pod, so this reaches it over loopback.
  location /terminal/ {
    proxy_pass http://127.0.0.1:7681;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  # Current build phase, written by the status sidecar. Missing until the first write (returns 404, which
  # the Blueprint poll ignores). Never cached, so the diagram sees fresh progress.
  location = /api/status {
    alias /run/status/status.json;
    default_type application/json;
    add_header Cache-Control "no-store" always;
  }

  location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
}
