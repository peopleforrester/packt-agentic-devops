# ABOUTME: Build and push the student web-terminal image (ttyd + kubectl + aws + Claude Code) to GHCR
# ABOUTME: on GitHub's runners. Triggered on changes to images/web-terminal/** or manually.
name: build-web-terminal

on:
  workflow_dispatch: {}
  push:
    branches: [staging, main]
    paths:
      - 'images/web-terminal/**'
      - '.github/workflows/build-web-terminal.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # The package is created by this workflow and auto-links to the repo, so the built-in
      # GITHUB_TOKEN (with packages: write above) can push it. No PAT secret required.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/web-terminal
          push: true
          tags: ghcr.io/peopleforrester/packt-agentic-devops:web-terminal
