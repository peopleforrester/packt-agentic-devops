# ABOUTME: ApplicationSet that deploys every generated agent-service. The SCM generator
# ABOUTME: finds repos in the in-cluster Gitea org that carry a manifests/ directory.
#
# The golden-path template publishes generated repos to in-cluster Gitea. The api URL is
# the Gitea service; owner is the org the template publishes under. tokenRef points at a
# Secret in the argocd namespace holding a Gitea API token.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: agent-services
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - scmProvider:
        gitea:
          owner: REPLACE_GITEA_ORG
          api: http://gitea-http.gitea.svc:3000
          allBranches: false
          tokenRef:
            secretName: gitea-scm-token
            key: token
        filters:
          - pathsExist:
              - manifests
  template:
    metadata:
      name: "agent-{{ .repository }}"
    spec:
      project: default
      source:
        repoURL: "{{ .url }}"
        targetRevision: "{{ .branch }}"
        path: manifests
      destination:
        server: https://kubernetes.default.svc
        namespace: kagent
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
