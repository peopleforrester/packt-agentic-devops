# Self-service App-of-Apps. Applied live in Module 3. It syncs the ApplicationSet that
# watches the in-cluster Gitea for scaffolder-generated agent repos and auto-creates an
# ArgoCD Application per repo (the golden path).
#
# Only applicationset.yaml is applied here. agent-service/ is a Backstage scaffolder
# template loaded by the Backstage catalog, not a Kubernetes manifest, so it is excluded.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-self-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/peopleforrester/packt-agentic-devops.git
    targetRevision: main
    path: platform/self-service
    directory:
      recurse: false
      include: "applicationset.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
