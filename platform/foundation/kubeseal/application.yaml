# ABOUTME: Sealed Secrets controller (the kubeseal backend). Encrypts Secrets so they
# ABOUTME: can live in Git. Installed into kube-system, wave 1.
#
# Source note: the chart moved from bitnami-labs.github.io (retired in Bitnami's 2025
# catalog sunset, now a hard 404) to the project's own GitHub Pages at
# bitnami.github.io/sealed-secrets. fullnameOverride matches the kubeseal CLI's default
# controller-name expectation, per the project README.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bitnami.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.19.0
    helm:
      valuesObject:
        fullnameOverride: sealed-secrets-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
