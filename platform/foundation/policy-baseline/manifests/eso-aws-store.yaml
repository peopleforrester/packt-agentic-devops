# ABOUTME: ClusterSecretStore wiring External Secrets Operator to AWS Secrets Manager.
# ABOUTME: Authenticates with the ESO controller service account via IRSA / Pod Identity.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/part-of: agentic-platform
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
      auth:
        # The ESO controller service account assumes an IAM role with
        # SecretsManager read access. The role is granted out of band (IRSA on
        # the dev cluster, Pod Identity on the workshop clusters). Until the role
        # exists, this store reports NotReady; it does not block other syncs.
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
