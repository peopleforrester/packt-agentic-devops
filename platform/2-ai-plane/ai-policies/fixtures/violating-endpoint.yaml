# ABOUTME: Fixture for ai-deny-llm-endpoint-bypass. A kagent-namespace Pod that hardcodes
# ABOUTME: an external OpenAI endpoint. In enforce mode Kyverno denies it.
#
# Isolated to a single policy: GHCR image and an OTel annotation keep the registry and
# observability policies satisfied, so the only violation is OPENAI_BASE_URL pointing at
# api.openai.com instead of the in-cluster agentgateway or vLLM. Not synced by ArgoCD
# (fixtures/, not manifests/). Applied by hand to show the denial.
apiVersion: v1
kind: Pod
metadata:
  name: violating-endpoint
  namespace: kagent
  labels:
    fixture: violating
  annotations:
    instrumentation.opentelemetry.io/inject-python: "true"
spec:
  containers:
    - name: app
      image: ghcr.io/peopleforrester/busybox:1.36
      command: ["sleep", "3600"]
      env:
        - name: OPENAI_BASE_URL
          value: "https://api.openai.com/v1"
