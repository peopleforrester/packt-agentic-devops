# ABOUTME: ArgoCD Application for the demo MCP server (KMCP MCPServer). Syncs after
# ABOUTME: kagent (which provides KMCP and the MCPServer CRD), wave 5.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: REPLACE_WITH_GIT_REMOTE
    targetRevision: staging
    path: platform/ai-plane/mcp-server/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true
