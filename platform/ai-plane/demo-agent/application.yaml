# ABOUTME: ArgoCD Application for the demo agent (Agent + ModelConfig).
# ABOUTME: Syncs after kagent and vLLM are up (wave 5).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-agent
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: REPLACE_WITH_GIT_REMOTE
    targetRevision: main
    path: platform/ai-plane/demo-agent/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
