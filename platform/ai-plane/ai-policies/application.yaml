# ABOUTME: ArgoCD Application for the AI-plane Kyverno policies (Audit mode).
# ABOUTME: Syncs after Kyverno CRDs exist. Phase 8 flips these policies to Enforce.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/peopleforrester/packt-agentic-devops.git
    targetRevision: main
    path: platform/ai-plane/ai-policies/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true
