apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 86.3.2
    helm:
      valuesObject:
        # The EKS control plane is managed and not scrapable; disable these
        # targets or they sit permanently failed.
        kubeScheduler:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeEtcd:
          enabled: false
        # Prometheus TSDB on a gp3 PVC (the gp3 StorageClass and EBS CSI driver
        # are foundation prerequisites). Do not use emptyDir.
        prometheus:
          prometheusSpec:
            retention: 6h
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi
        grafana:
          enabled: true
          # WORKSHOP FIXTURE for P03/B03, the one sanctioned on-screen failure.
          #
          # This tag does not exist. Grafana's pod goes ImagePullBackOff, this Application sits
          # Degraded in the ArgoCD UI, and the error names the tag, so the root cause is
          # discoverable from the UI alone. The correct tag is 13.0.2, the appVersion of the
          # grafana sub-chart (12.4.8) vendored inside kube-prometheus-stack 86.3.2.
          #
          # The fix a student makes: change the tag below to "13.0.2" and commit. ArgoCD is on
          # automated sync with selfHeal, and because the fault lives in Git rather than in the
          # cluster, selfHeal will NOT paper over it: it stays broken until Git is corrected,
          # which is precisely the lesson. Deleting the pod does not fix it either.
          #
          # Do NOT "fix" this in the repo. It is load-bearing for the workshop, and
          # tests/test_fleet_contract.py asserts it is still here.
          image:
            tag: "13.0.2-hotfix"
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
# CRDs ship in a crds sub-chart installed on first install only. For a CRD-schema
# bump, apply the operator CRDs server-side before upgrading.
