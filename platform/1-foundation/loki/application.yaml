apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # grafana-community repo: the old grafana repo OSS charts are frozen.
    repoURL: https://grafana-community.github.io/helm-charts
    chart: loki
    targetRevision: 17.4.7
    helm:
      valuesObject:
        # Monolithic for the demo; Simple Scalable is deprecated pre-4.0.
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
        singleBinary:
          replicas: 1
        # Bundled MinIO is deprecated (removal 2026-10-31); off for the demo.
        minio:
          enabled: false
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        # Disable the scalable-mode components in SingleBinary.
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
