# ABOUTME: ArgoCD Application for the cert-manager ClusterIssuers.
# ABOUTME: Syncs after cert-manager's CRDs are established (wave 1).
#
# Raw manifests live under manifests/. Needs the Git remote set on repoURL to sync
# through ArgoCD. Until a remote exists, apply manifests/ directly with kubectl.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-issuers
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/peopleforrester/packt-agentic-devops.git
    targetRevision: main
    path: platform/1-foundation/cert-manager-issuers/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ServerSideApply=true
