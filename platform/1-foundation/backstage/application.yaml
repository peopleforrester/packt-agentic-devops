apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
  annotations:
    # Wave 4: last. Backstage is the front door; it sits on top of the
    # foundation and shows live ArgoCD and Kubernetes state.
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://backstage.github.io/charts
    chart: backstage
    targetRevision: 2.8.2
    helm:
      valuesObject:
        backstage:
          # Pre-built custom image, never built from source live. Mirror to the
          # workshop GHCR namespace. The chart's built-in image is demo-only and
          # carries no plugins; the real app must be a custom image.
          image:
            # The chart builds the ref as registry/repository, so repository must NOT repeat the
            # host. It read ghcr.io/ghcr.io/peopleforrester/backstage, a doubled path that resolved
            # to a different, broken image, and the pod crash-looped with
            # "Cannot find module '/app/packages/backend'". The correctly-pathed image is fine.
            registry: ghcr.io
            repository: peopleforrester/backstage
            # 2026-07-23-2 adds a layer that sets /app to 0755. The base 2026-07-23 image left /app
            # at 0700 root, and the container runs as the non-root node user, which then could not
            # traverse /app and crashed with "Cannot find module '/app/packages/backend'". The
            # Dockerfile now chmods /app so a fresh build needs no such patch (internal/images/
            # backstage/Dockerfile); this tag carries the fix for the already-built image.
            tag: 2026-07-23-2
        # Bundled PostgreSQL for the demo. Production backs the catalog with RDS.
        # No existingSecret: it named backstage-postgresql, which nothing created, so both the
        # database pod and the Backstage backend failed with "secret backstage-postgresql not
        # found" and the whole app stayed Degraded. Unset, the bundled chart generates its own
        # password secret and the Backstage backend wires to it, which is the chart's happy path
        # and correct for a throwaway cluster whose catalog DB is ephemeral.
        postgresql:
          enabled: true
        service:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
# Built with the new backend system and the New Frontend System (default since
# v1.49.0). Scaffolder templates use scaffolder.backstage.io/v1beta3 (Nunjucks).
# Presenter cluster runs real GitHub OAuth; attendee clusters run guest auth with
# the OAuth wiring present but commented (see build-spec 6.5).
