# Production App-of-Apps. Points ArgoCD at platform/1-foundation in this repo and
# recurses for the per-component Application manifests.
#
# This needs the repo to be reachable by ArgoCD over Git. Set repoURL to the Git
# remote once one exists. Until then, use the dev path in bootstrap/README.md
# (apply the per-component Applications directly; each is Helm-sourced).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-foundation
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/peopleforrester/packt-agentic-devops.git
    targetRevision: main
    path: platform/1-foundation
    directory:
      recurse: true
      # Pick up only the per-component Application manifests. Raw manifests under
      # each component's manifests/ subdir are owned by that component's own
      # Application, not applied directly by this root app.
      include: "*/application.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
