# Production App-of-Apps. Points ArgoCD at platform/1-foundation in this repo and
# recurses for the per-component Application manifests.
#
# Sourced from the IN-CLUSTER Gitea, which provisioning installs and seeds with these
# manifests before the student starts. That keeps each cluster self-contained: no GitHub
# in the reconcile loop, and the student can push to this remote and watch ArgoCD apply
# their own commit. The repo is public inside the cluster, so ArgoCD needs no credential.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-foundation
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: http://gitea-http.gitea.svc:3000/platform/packt-agentic-devops.git
    targetRevision: main
    path: platform/1-foundation
    directory:
      recurse: true
      # Pick up only the per-component Application manifests. Raw manifests under
      # each component's manifests/ subdir are owned by that component's own
      # Application, not applied directly by this root app.
      include: "*/application.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
