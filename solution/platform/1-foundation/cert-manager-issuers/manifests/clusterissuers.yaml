# cert-manager ClusterIssuers. Synced after cert-manager (its CRDs and webhook
# must be ready first). The self-signed issuer works with no DNS and covers the
# demo; the Let's Encrypt staging issuer is the templated real-CA path.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # A real, parseable email. The placeholder REPLACE_WITH_EMAIL made ACME account registration
    # fail ("invalidContact: unable to parse email address") and left this ClusterIssuer, and so
    # the cert-manager-issuers Application, permanently Degraded. This issuer is a demonstration:
    # workshop TLS terminates at the Railway edge, so nothing on-cluster requests a cert from it,
    # but it must register cleanly to read Healthy. A static workshop address is correct here;
    # there is no per-cluster email to template.
    email: workshop@ai-enhanced-devops.com
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - http01:
          ingress:
            ingressClassName: alb
