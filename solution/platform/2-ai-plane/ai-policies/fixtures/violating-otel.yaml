# ABOUTME: Fixture for ai-require-otel-annotations. A kserve-namespace Pod with a GHCR
# ABOUTME: image but no OTel injection annotation. In enforce mode Kyverno denies it.
#
# Isolated to a single policy: the image is GHCR (passes the registry policy), so the
# only violation is the missing instrumentation.opentelemetry.io/inject-* annotation.
# Not synced by ArgoCD (fixtures/, not manifests/). Applied by hand to show the denial.
apiVersion: v1
kind: Pod
metadata:
  name: violating-otel
  namespace: kserve
  labels:
    fixture: violating
spec:
  containers:
    - name: app
      image: ghcr.io/peopleforrester/busybox:1.36
      command: ["sleep", "3600"]
