# ABOUTME: Starship prompt for the workshop VTT. Pure ASCII (letters, ':', '>', '+'), no emoji or Nerd-Font
# ABOUTME: glyphs, so it renders identically in every browser. Color carries the styling, not symbols.

"$schema" = 'https://starship.rs/config-schema.json'
add_newline = true

format = """
$directory$git_branch$git_status$kubernetes$aws$cmd_duration
$character"""

[character]
success_symbol = "[>](bold #FA7040)"
error_symbol = "[>](bold red)"
vimcmd_symbol = "[<](bold #FA7040)"

[directory]
style = "bold #FA7040"
truncation_length = 4
truncate_to_repo = true
read_only = " ro"
read_only_style = "red"

[git_branch]
symbol = ""
format = '[$branch]($style) '
style = "bold purple"

[git_status]
style = "bold yellow"
format = '([$all_status$ahead_behind]($style) )'

[kubernetes]
disabled = false
symbol = ""
format = '[k8s:$context]($style)[ ns:$namespace]($style) '
style = "bold #4a9df0"

[aws]
disabled = false
symbol = ""
format = '[aws:$profile( $region)]($style) '
style = "bold #FF9900"

[cmd_duration]
min_time = 500
format = '[+$duration]($style) '
style = "dimmed yellow"

[time]
disabled = true

[hostname]
disabled = true
