# ABOUTME: tmux config for the workshop VTT. Persistent per-session shells behind ttyd, so a browser
# ABOUTME: refresh re-attaches instead of killing the session. Tuned for a browser terminal, not a TTY.
set -g mouse on
set -g history-limit 50000
set -g default-command "bash --rcfile ~/.bashrc"
set -g status off
set -g escape-time 10
set -g destroy-unattached off
setw -g aggressive-resize on
